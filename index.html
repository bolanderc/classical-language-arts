<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Classical Language Arts</title>
  <style>
    :root {
      --ink: #263238;
      --paper: #fffaf0;
      --gold: #f2c744;
      --blue: #1d63b7;
      --green: #4c9a4f;
      --purple: #7a48b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        linear-gradient(135deg, rgba(29, 99, 183, 0.13), rgba(76, 154, 79, 0.13)),
        var(--paper);
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 7vw, 5.4rem);
      line-height: 0.95;
    }

    p {
      max-width: 680px;
      margin: 16px 0 0;
      color: #4c5a50;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-top: 34px;
    }

    a {
      display: grid;
      align-content: center;
      min-height: 150px;
      padding: 18px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      color: inherit;
      background: #ffffff;
      box-shadow: 6px 6px 0 var(--ink);
      text-decoration: none;
      transition: transform 140ms ease, box-shadow 140ms ease;
    }

    a:hover,
    a:focus-visible {
      transform: translate(3px, 3px);
      box-shadow: 3px 3px 0 var(--ink);
    }

    a:nth-child(1) {
      background: linear-gradient(135deg, #ffffff, rgba(242, 199, 68, 0.65));
    }

    a:nth-child(2) {
      background: linear-gradient(135deg, #ffffff, rgba(122, 72, 184, 0.32));
    }

    a:nth-child(3) {
      background: linear-gradient(135deg, #ffffff, rgba(76, 154, 79, 0.34));
    }

    strong {
      display: block;
      margin-bottom: 8px;
      font-size: 1.35rem;
    }

    span {
      color: #52605a;
      font-weight: 700;
    }

    @media (max-width: 760px) {
      .links {
        grid-template-columns: 1fr;
      }

      a {
        min-height: 120px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Classical Language Arts</h1>
    <p>Family dashboard, parent approvals, and the literature companion in one GitHub Pages site.</p>

    <nav class="links" aria-label="Site links">
      <a href="kid-dashboard/index.html">
        <strong>Kids Dashboard</strong>
        <span>James and Emma track school work.</span>
      </a>
      <a href="kid-dashboard/parent-review.html">
        <strong>Parent Review</strong>
        <span>Approve submitted work for credit.</span>
      </a>
      <a href="literature-companion/index.html">
        <strong>Literature Companion</strong>
        <span>Open the textbook and reading units.</span>
      </a>
    </nav>
  </main>
</body>
</html>
