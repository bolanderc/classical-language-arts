<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Parent Review</title>
  <style>
    :root {
      --ink: #263238;
      --paper: #fffaf0;
      --line: #d8c9a5;
      --blue: #1d63b7;
      --gold: #f2c744;
      --green: #4c9a4f;
      --red: #c9384a;
      --purple: #7a48b8;
      --shadow: 0 14px 36px rgba(57, 43, 25, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        linear-gradient(135deg, rgba(29, 99, 183, 0.14), rgba(242, 199, 68, 0.2)),
        var(--paper);
    }

    button,
    input {
      font: inherit;
    }

    .shell {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 1;
    }

    p {
      margin: 8px 0 0;
      color: #52605a;
      font-weight: 700;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 10px 14px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 3px 3px 0 var(--ink);
      color: inherit;
      text-decoration: none;
      font-weight: 900;
      cursor: pointer;
    }

    .button.primary {
      background: var(--gold);
    }

    .button.danger {
      background: #ffe1e6;
    }

    .button.small {
      min-height: 34px;
      padding: 6px 10px;
      font-size: 0.92rem;
    }

    .panel {
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .lock-panel {
      max-width: 460px;
      margin: 46px auto;
      text-align: center;
    }

    .lock-panel label {
      display: block;
      margin: 16px 0 8px;
      font-weight: 900;
    }

    .pin-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
    }

    .pin-row input {
      width: 100%;
      padding: 10px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: #ffffff;
      font-weight: 900;
      text-align: center;
    }

    .error {
      min-height: 24px;
      color: var(--red);
      font-weight: 900;
    }

    .hidden {
      display: none;
    }

    .review-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .review-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border: 2px solid var(--ink);
      border-radius: 8px;
      background: #fffdf7;
    }

    .review-item h2 {
      margin: 0 0 4px;
      font-size: 1.1rem;
    }

    .review-item p {
      margin: 0;
    }

    .review-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .empty {
      padding: 22px;
      border: 2px dashed #8a806b;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      text-align: center;
      font-weight: 900;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .summary-card {
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 14px;
      background: #ffffff;
    }

    .summary-card strong {
      display: block;
      font-size: 2.2rem;
      line-height: 1;
    }

    @media (max-width: 700px) {
      .topbar,
      .review-item,
      .pin-row,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .topbar,
      .review-actions {
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="panel lock-panel" id="lock-panel">
      <h1>Parent Review</h1>
      <p>Enter the parent PIN to approve submitted work.</p>
      <label for="pin">Parent PIN</label>
      <div class="pin-row">
        <input id="pin" type="password" inputmode="numeric" autocomplete="off" aria-describedby="pin-error">
        <button class="button primary" type="button" id="unlock">Unlock</button>
      </div>
      <p class="error" id="pin-error" aria-live="polite"></p>
    </section>

    <section class="hidden" id="review-app">
      <header class="topbar">
        <div>
          <h1>Parent Review</h1>
          <p>Approve submitted work here. Credit appears on the kids' dashboard after refresh.</p>
        </div>
        <a class="button" href="index.html">Back to Kids Dashboard</a>
      </header>

      <section class="panel">
        <h2>Waiting for Approval</h2>
        <div class="summary-grid">
          <article class="summary-card">
            <strong id="pending-count">0</strong>
            <span>pending items</span>
          </article>
          <article class="summary-card">
            <strong id="james-average">0%</strong>
            <span>James approved weekly progress</span>
          </article>
        </div>
        <div class="review-list" id="review-list"></div>
      </section>
    </section>
  </main>

  <script>
    const parentPin = "0815";
    const weeklyTarget = 80;
    const storagePrefix = "school-dashboard:";

    const jamesSubjects = [
      { name: "Math", unit: "pages", assigned: 3 },
      { name: "Reading", unit: "sections", assigned: 4 },
      { name: "Writing", unit: "assignments", assigned: 2 },
      { name: "Spelling", unit: "practices", assigned: 3 },
      { name: "Grammar", unit: "lessons", assigned: 2 },
      { name: "Science", unit: "sections", assigned: 2 },
      { name: "History", unit: "sections", assigned: 2 },
      { name: "Projects", unit: "steps", assigned: 1 }
    ];

    const emmaItems = [
      "Math lesson finished",
      "Math corrections checked",
      "Reading pages completed",
      "Narration told back clearly",
      "Copywork written neatly",
      "Spelling words practiced",
      "Writing response finished",
      "Literature companion opened",
      "Science or history notebook done",
      "Work area cleaned up"
    ];

    function getSaved(key, fallback) {
      const saved = localStorage.getItem(storagePrefix + key);
      return saved === null ? fallback : saved;
    }

    function save(key, value) {
      localStorage.setItem(storagePrefix + key, value);
    }

    function subjectSlug(subject) {
      return subject.name.toLowerCase().replaceAll(" ", "-");
    }

    function getSubjectCounts(subject) {
      const slug = subjectSlug(subject);
      const assigned = Math.max(1, Number(getSaved("james-assigned-" + slug, String(subject.assigned))));
      const done = Math.max(0, Math.min(assigned, Number(getSaved("james-done-" + slug, "0"))));
      const submitted = Math.max(0, Math.min(assigned, Number(getSaved("james-submitted-" + slug, "0"))));
      const approved = Math.max(0, Math.min(assigned, Number(getSaved("james-approved-" + slug, "0"))));
      return { assigned, done, submitted, approved };
    }

    function getJamesAverage() {
      const total = jamesSubjects.reduce((sum, subject) => {
        const counts = getSubjectCounts(subject);
        return sum + Math.round((counts.approved / counts.assigned) * 100);
      }, 0);
      return Math.round(total / jamesSubjects.length);
    }

    function buildReviewItems() {
      const reviewItems = [];

      jamesSubjects.forEach((subject) => {
        const slug = subjectSlug(subject);
        const counts = getSubjectCounts(subject);
        if (counts.submitted > counts.approved) {
          reviewItems.push({
            student: "James",
            title: subject.name,
            detail: counts.submitted + " " + subject.unit + " submitted; " + counts.approved + " approved; " + counts.assigned + " assigned.",
            action: "Approve " + counts.submitted + "/" + counts.assigned,
            returnAction: "Send Back",
            type: "james",
            slug
          });
        }
      });

      emmaItems.forEach((item, index) => {
        const submitted = getSaved("emma-check-" + index, "false") === "true";
        const approved = getSaved("emma-approved-" + index, "false") === "true";
        if (submitted && !approved) {
          reviewItems.push({
            student: "Emma",
            title: item,
            detail: "Checklist item submitted and waiting for parent approval.",
            action: "Approve",
            returnAction: "Send Back",
            type: "emma",
            index
          });
        }
      });

      return reviewItems;
    }

    function renderReview() {
      const container = document.getElementById("review-list");
      const reviewItems = buildReviewItems();
      document.getElementById("pending-count").textContent = reviewItems.length;
      document.getElementById("james-average").textContent = getJamesAverage() + "%";
      container.replaceChildren();

      if (reviewItems.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No submitted work is waiting right now.";
        container.append(empty);
        return;
      }

      reviewItems.forEach((item) => {
        const reviewItem = document.createElement("article");
        reviewItem.className = "review-item";
        reviewItem.innerHTML = `
          <div>
            <h2>${item.student}: ${item.title}</h2>
            <p>${item.detail}</p>
          </div>
          <div class="review-actions">
            <button class="button small primary" type="button" data-approve>${item.action}</button>
            <button class="button small danger" type="button" data-return>${item.returnAction}</button>
          </div>
        `;

        reviewItem.querySelector("[data-approve]").addEventListener("click", () => {
          if (item.type === "james") {
            save("james-approved-" + item.slug, getSaved("james-submitted-" + item.slug, "0"));
          } else {
            save("emma-approved-" + item.index, "true");
          }
          renderReview();
        });

        reviewItem.querySelector("[data-return]").addEventListener("click", () => {
          if (item.type === "james") {
            save("james-submitted-" + item.slug, getSaved("james-approved-" + item.slug, "0"));
          } else {
            save("emma-check-" + item.index, "false");
            save("emma-approved-" + item.index, "false");
          }
          renderReview();
        });

        container.append(reviewItem);
      });
    }

    function unlock() {
      const input = document.getElementById("pin");
      const error = document.getElementById("pin-error");

      if (input.value !== parentPin) {
        error.textContent = "That PIN did not work.";
        input.select();
        return;
      }

      sessionStorage.setItem("school-dashboard-parent-unlocked", "true");
      document.getElementById("lock-panel").classList.add("hidden");
      document.getElementById("review-app").classList.remove("hidden");
      renderReview();
    }

    document.getElementById("unlock").addEventListener("click", unlock);
    document.getElementById("pin").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        unlock();
      }
    });

    if (sessionStorage.getItem("school-dashboard-parent-unlocked") === "true") {
      document.getElementById("lock-panel").classList.add("hidden");
      document.getElementById("review-app").classList.remove("hidden");
      renderReview();
    }
  </script>
</body>
</html>
